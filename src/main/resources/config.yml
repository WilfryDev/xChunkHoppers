settings:
  enabled: true
  use-whitelist: false
  filter-list:
    - "COBBLESTONE"
    - "DIRT"
    - "ROTTEN_FLESH"

#          CONFIGURACIÓN DE MENÚS
shop-menu:
  commands:
    - "hoppershop"
    - "tiendatolvas"
    - "tolvas"
    - "tolvashoppen"
  title: "          Tienda de Tolvas"
  size: 36
  fill:
    enabled: true
    material: "BLACK_STAINED_GLASS_PANE"

  close-button:
    enabled: true
    material: "BARRIER"
    name: "&fMenú &8▸ &cerrar"
    slot: 31
    lore:
      - "&7 ℹ Descripción"
      - ""
      - "&c ✘ ¡Click para cerrar!"
      - ""

  price-format:
    - "&7Botón | Compra"
    - ""
    - "&7 ℹ Información:"
    - " &8 • &fPrecio: &a$%price%$ ⛃"
    - ""
    - "&e ▸ ¡Click para comprar!"
    - ""

  items:
    item_1:
      material: "IRON_TRAPDOOR"
      type: "default"
      price: 5000.0
      slot: 10
    item_2:
      material: "GOLD_TRAPDOOR"
      type: "vip"
      price: 25000.0
      slot: 11
    item_3:
      material: "DIAMOND_TRAPDOOR"
      type: "god"
      price: 100000.0
      slot: 12

info-menu:
  title: "        Información de la tolva"
  size: 27
  date-format: "dd/MM/yyyy HH:mm"
  fill:
    enabled: true
    material: "GRAY_STAINED_GLASS_PANE"
  info-item:
    material: "PAPER"
    slot: 13
    name: "&#00ff00 ★ ¡Estadísticas!"
    lore:
      - "&8Información General"
      - ""
      - "&8 | &fDueño: &#FCD05C%owner%"
      - "&8 | &fTipo: &#3DFF4A%type%"
      - "&8 | &fColocado el: &#C9E4DE%date%"
      - "&8 | &fÍtems Absorbidos: &6%items%"
      - ""
      - "&#00ff00 ☄ ¡Sigue recolectando!"

  preview-slots:
    - 11
    - 12
    - 13
    - 14
    - 15

